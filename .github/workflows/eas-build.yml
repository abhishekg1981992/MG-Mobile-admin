name: EAS Build (Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'admin-app/**'
      - '.github/workflows/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Ensure EAS project is configured
        run: eas init --id 394513c4-fa8f-4ecf-8f5e-e54e01dd0863 --non-interactive

      - name: Build Android APK
        id: eas_build
        run: |
          set -euo pipefail
          echo "Starting EAS build..."
          eas build --platform android --profile preview --non-interactive --json | tee /tmp/eas-output.json
          APK_URL=$(jq -r '.[0].artifacts.buildUrl // empty' /tmp/eas-output.json)
          if [ -z "$APK_URL" ]; then
            echo "Could not extract APK URL from build output, fetching latest build..."
            eas build:list --platform android --status finished --limit 1 --json | tee /tmp/eas-list.json
            APK_URL=$(jq -r '.[0].artifacts.buildUrl' /tmp/eas-list.json)
          fi
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "::error::Failed to get APK URL"
            exit 1
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "APK URL: $APK_URL"

      - name: Download APK
        run: |
          curl -L -o admin-app.apk "${{ steps.eas_build.outputs.apk_url }}"
          ls -lh admin-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: admin-app/admin-app.apk
          if-no-files-found: error

      - name: Upload APK to Google Drive
        id: gdrive_upload
        continue-on-error: true
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > /tmp/gdrive-creds.json

          # Install googleapis
          npm init -y > /dev/null 2>&1
          npm install googleapis > /dev/null 2>&1

          node << 'SCRIPT'
          const { google } = require('googleapis');
          const fs = require('fs');

          async function upload() {
            const auth = new google.auth.GoogleAuth({
              keyFile: '/tmp/gdrive-creds.json',
              scopes: ['https://www.googleapis.com/auth/drive'],
            });

            const drive = google.drive({ version: 'v3', auth });
            const folderId = process.env.GDRIVE_FOLDER_ID;

            // Preflight check for clearer diagnostics when folder ID is wrong
            // or the service account has not been shared on that folder.
            await drive.files.get({
              fileId: folderId,
              fields: 'id,name',
              supportsAllDrives: true,
            });

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const fileName = `admin-app-${timestamp}.apk`;

            const res = await drive.files.create({
              requestBody: {
                name: fileName,
                parents: [folderId],
              },
              media: {
                mimeType: 'application/vnd.android.package-archive',
                body: fs.createReadStream('admin-app.apk'),
              },
              fields: 'id, name, webViewLink',
              supportsAllDrives: true,
            });

            console.log(`Uploaded: ${res.data.name}`);
            console.log(`File ID: ${res.data.id}`);
            console.log(`Link: ${res.data.webViewLink}`);
          }

          upload().catch(err => { console.error(err); process.exit(1); });
          SCRIPT

          rm -f /tmp/gdrive-creds.json

      - name: Final build summary
        if: always()
        run: |
          echo "APK artifact: admin-app-apk"
          echo "APK URL: ${{ steps.eas_build.outputs.apk_url }}"

          if [ "${{ steps.gdrive_upload.outcome }}" = "success" ]; then
            echo "Google Drive upload: success"
            echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "- APK artifact: admin-app-apk" >> "$GITHUB_STEP_SUMMARY"
            echo "- APK URL: ${{ steps.eas_build.outputs.apk_url }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Google Drive upload: success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Google Drive upload failed. APK is still available in artifact 'admin-app-apk'."
            echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "- APK artifact: admin-app-apk" >> "$GITHUB_STEP_SUMMARY"
            echo "- APK URL: ${{ steps.eas_build.outputs.apk_url }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Google Drive upload: failed (check folder sharing and GDRIVE_FOLDER_ID secret)" >> "$GITHUB_STEP_SUMMARY"
          fi
