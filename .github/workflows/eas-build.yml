name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Find and rename APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          cp "$APK_PATH" admin-app.apk
          echo "path=admin-app/admin-app.apk" >> "$GITHUB_OUTPUT"
          ls -lh admin-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: admin-app/admin-app.apk
          if-no-files-found: error

      - name: Generate release tag
        id: tag
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Android APK — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: admin-app/admin-app.apk
          fail_on_unmatched_files: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK artifact:** admin-app-apk" >> "$GITHUB_STEP_SUMMARY"
