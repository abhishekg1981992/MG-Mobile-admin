name: EAS Build (Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'admin-app/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Ensure EAS project is configured
        run: eas init --id 394513c4-fa8f-4ecf-8f5e-e54e01dd0863 --non-interactive

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
