version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: insurance_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  app:
    build: .
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: example
      DB_NAME: insurance_db
      JWT_SECRET: supersecretkey123
    ports:
      - "5000:5000"
    depends_on:
      - db
volumes:
  db_data:
