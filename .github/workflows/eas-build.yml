name: EAS Build (Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'admin-app/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Ensure EAS project is configured
        run: eas init --id 394513c4-fa8f-4ecf-8f5e-e54e01dd0863 --non-interactive

      - name: Build Android APK
        id: eas_build
        run: |
          set -euo pipefail
          echo "Starting EAS build..."
          eas build --platform android --profile preview --non-interactive --json | tee /tmp/eas-output.json
          APK_URL=$(jq -r '.[0].artifacts.buildUrl // empty' /tmp/eas-output.json)
          if [ -z "$APK_URL" ]; then
            echo "Could not extract APK URL from build output, fetching latest build..."
            eas build:list --platform android --status finished --limit 1 --json | tee /tmp/eas-list.json
            APK_URL=$(jq -r '.[0].artifacts.buildUrl' /tmp/eas-list.json)
          fi
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "::error::Failed to get APK URL"
            exit 1
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "APK URL: $APK_URL"

      - name: Download APK
        run: |
          curl -L -o admin-app.apk "${{ steps.eas_build.outputs.apk_url }}"
          ls -lh admin-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-apk
          path: admin-app/admin-app.apk
          if-no-files-found: error

      - name: Generate release tag
        id: tag
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Android APK — ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            EAS build URL: ${{ steps.eas_build.outputs.apk_url }}
          files: admin-app/admin-app.apk
          fail_on_unmatched_files: true

      - name: Final build summary
        if: always()
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK artifact:** admin-app-apk" >> "$GITHUB_STEP_SUMMARY"
          echo "- **EAS build URL:** ${{ steps.eas_build.outputs.apk_url }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.release.outcome }}" = "success" ]; then
            echo "- **GitHub Release:** ${{ steps.release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **GitHub Release:** failed" >> "$GITHUB_STEP_SUMMARY"
          fi
